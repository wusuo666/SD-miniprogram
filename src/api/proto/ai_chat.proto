syntax = "proto3";

// AI Chat 单条消息记录（一问一答）
enum MessageType {
  TEXT = 0; // 文本消息
  IMAGE = 1; // 图片消息
  VOICE = 2; // 语音消息
}

message AiChatMessage {
  int32 id = 1; // 消息ID
  string session_id = 2; // 对话会话ID
  string openid = 3; // 用户openid
  string title = 4; // 对话标题
  string user_message = 5; // 用户发送的消息
  string ai_response = 6; // AI回复的内容
  MessageType message_type = 7; // 消息类型
  int64 created_at = 8; // 创建时间戳（秒）
  int64 updated_at = 9; // 更新时间戳（秒）
}

// 对话会话信息（用于会话列表）
message AiChatSession {
  string session_id = 1; // 会话ID
  string openid = 2; // 用户openid
  string title = 3; // 会话标题
  int32 message_count = 4; // 消息数量
  int64 created_at = 5; // 创建时间戳
  int64 last_message_at = 6; // 最后一条消息时间
}

message SaveChatRequest {
  string session_id = 1; // 对话会话ID（新对话传空字符串）
  string title = 2; // 对话标题（新对话时必填）
  string user_message = 3; // 用户发送的消息
  string ai_response = 4; // AI回复的内容
  MessageType message_type = 5; // 消息类型（默认TEXT）这个字段不用管
}

message SaveChatResponse {
  AiChatMessage message = 1; // 保存的消息记录
  string session_id = 2; // 会话ID
  int32 code = 3; // 状态码：200成功，其他失败
  string message_info = 4; // 提示信息
}

message GetSessionListResponse {
  repeated AiChatSession sessions = 1; // 会话列表
  int32 total = 2; // 总会话数
  int32 code = 3; // 状态码
  string message = 4; // 提示信息
}

// 获取单个会话详情响应（包含该会话的所有消息）
message GetSessionResponse {
  string session_id = 1; // 会话ID
  string title = 2; // 会话标题
  string openid = 3; // 用户openid
  repeated AiChatMessage messages = 4; // 该会话下的所有消息列表
  int32 total_messages = 5; // 消息总数
  int64 created_at = 6; // 会话创建时间（第一条消息时间）
  int64 last_message_at = 7; // 最后一条消息时间
  int32 code = 8; // 状态码
  string message = 9; // 提示信息
}